# ────────────────────────────────────────────────────
# 论文追踪系统配置
# ────────────────────────────────────────────────────

# 浏览器：生产环境建议 true（无头），调试时设 false 观察行为
headless: true

# 历史去重库路径
history_path: "data/history.json"

# 日志目录
log_dir: "data/logs"

# ────────────────────────────────────────────────────
# 飞书字段映射
# 左侧是 SOP 中定义的字段 key，右侧改成你飞书多维表格实际的字段名称
# ────────────────────────────────────────────────────
feishu:
  # 如果你的多维表嵌套在 Wiki 里（URL 含 /wiki/ 而不是 /base/），设为 true
  # 这种情况下 .env 里的 FEISHU_APP_TOKEN 填 wiki node token（/wiki/ 后面那段）
  # 程序会自动调飞书 API 把它转换为真实的 app_token，需要 wiki:wiki:readonly 权限
  is_wiki: false

  field_mapping:
    论文: "论文"
    标题: "标题"
    机构: "机构"
    日期: "日期"
    作者: "作者"
    arxiv: "arxiv"
    project: "project"
    概要: "概要"
    简介: "简介"
    图片: "图片"
