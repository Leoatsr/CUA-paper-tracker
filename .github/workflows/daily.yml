name: Daily Paper Tracker

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install selenium webdriver-manager requests pyyaml

      - name: Run tracker
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WIKI_TOKEN: ${{ secrets.FEISHU_WIKI_TOKEN }}
        run: |
          python -c "
          t = open('config.yaml').read().replace('headless: false','headless: true')
          open('config.yaml','w').write(t)
          "
          python paper_tracker.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report
          path: report.html
