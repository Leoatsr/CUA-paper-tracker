name: Daily Paper Tracker

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install selenium webdriver-manager requests pyyaml

      - name: Run tracker
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WIKI_TOKEN: ${{ secrets.FEISHU_WIKI_TOKEN }}
        run: |
          python -c "
          t = open('config.yaml').read().replace('headless: false','headless: true')
          open('config.yaml','w').write(t)
          "
          python paper_tracker.py

      - name: Save processed records
        run: |
          git config user.email "action@github.com"
          git config user.name "Paper Tracker Bot"
          git add processed_papers.json || true
          git diff --staged --quiet || git commit -m "update processed papers [$(date +%Y-%m-%d-%H%M)]"
          git push || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ github.run_number }}
          path: report.html
