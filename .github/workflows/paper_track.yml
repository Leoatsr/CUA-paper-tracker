name: 📄 Paper Tracker — Daily Run

on:
  schedule:
    # UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 支持在 GitHub Actions 页面手动触发

jobs:
  track-papers:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run Paper Tracker
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WIKI_TOKEN: ${{ secrets.FEISHU_WIKI_TOKEN }}
        run: python paper_tracker.py

      - name: Commit processed records
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Paper Tracker Bot"
          git add processed_papers.json || true
          git diff --staged --quiet || git commit -m "📄 Update processed papers [$(date +%Y-%m-%d)]"
          git push || true
